<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script defer src="index.js"></script>
    <title>Calculator</title>
  </head>
  <body>
    <!-- <textarea name="text" class="text" maxlength="100" value="0"></textarea> -->
    <noscript
      >Whoops! It seems like your browser either does not support JavaScript or
      you have had it turned off in your browser settings. Please switch to a
      browser which supprts JavaScript or turn it on in your settings</noscript
    >
    <span id="text"></span>
    <div id="row-1">
      <button id="del" class="symbol del" aria-label="Delete a number">&times;</button>
      <button id="c" class="num">C</button>
      <button id="ce" class="num">CE</button>
      <button id="percent" class="num">%</button>
    </div>
    <div id="row-2">
      <button id="divide" class="symbol">&div;</button>
      <button id="sqrt" class="num">&Sqrt;x</button>
      <button id="squared" class="num">x<sup>2</sup></button>
      <button id="half" class="num">&half;</button>
    </div>
    <div id="row-3">
      <button id="mul" class="symbol">&times;</button>
      <button id="nine" class="num">9</button>
      <button id="eight" class="num">8</button>
      <button id="seven" class="num">7</button>
    </div>
    <div id="row-4">
      <button id="minus" class="symbol">&minus;</button>
      <button id="six" class="num">6</button>
      <button id="five" class="num">5</button>
      <button id="four" class="num">4</button>
    </div>
    <div id="row-5">
      <button id="plus" class="symbol">&plus;</button>
      <button id="three" class="num">3</button>
      <button id="two" class="num">2</button>
      <button id="one" class="num">1</button>
    </div>
    <div id="row-6">
      <button id="equals" class="symbol">&equals;</button>
      <button id="dpoint" class="num">.</button>
      <button id="zero" class="num">0</button>
      <button id="plusminus" class="symbol">&plusmn;</button>
    </div>
  </body>
</html>
